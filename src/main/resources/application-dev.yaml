server:
  port: 9090 
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/folio
    username: ${DB_USERNAME} 
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        highlight_sql: true


logging:
  level:
    org:
      hibernate:
        SQL: INFO
        orm:
          jdbc:
            bind: TRACE
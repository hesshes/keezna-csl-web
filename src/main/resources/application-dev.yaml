server:
  port: 9090 
  tomcat:
    accesslog:
      enabled: true
      pattern: '%h %l %u %t "%r" %s %b'
      directory: c:/Temp/logs/tomcat
      prefix: access_log

spring:
  datasource:
    url: jdbc:mysql://mysql.keezna.mooo.com:50000/folio
    username: ${DB_USERNAME} 
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        highlight_sql: true

  servlet:
    multipart:
      max-request-size: 30MB
      max-file-size: 10MB

keezna:
  upload:
    path: c:\Temp\upload

logging:
    org:
      hibernate:
        SQL: INFO
        orm:
          jdbc:
            bind: TRACE


